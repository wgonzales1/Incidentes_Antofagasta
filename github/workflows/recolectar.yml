name: Recolectar Incidentes TomTom

on:
  schedule:
    - cron: '*/20 * * * *'   # cada 20 minutos
  workflow_dispatch:           # también permite correrlo manualmente

jobs:
  recolectar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr script
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: python recolectar.py

      - name: Commit y push del CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/incidentes.csv
          git diff --cached --quiet || git commit -m "datos $(date -u '+%Y-%m-%d %H:%M')"
          git push